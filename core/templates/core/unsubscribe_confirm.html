<!doctype html>
<html><head><meta charset="utf-8"><title>Unsubscribe</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"></head>
<body class="bg-light">
<div class="container" style="max-width: 520px; margin-top: 10vh;">
  <div class="card">
    <div class="card-body p-4">
      <h1 class="h4 mb-3">Unsubscribe</h1>
      <p class="text-muted">Are you sure you want to unsubscribe <strong>{{ recipient.contact.email }}</strong> from future emails from {{ recipient.campaign.from_name }}?</p>
      <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger w-100">Yes, unsubscribe me</button>
      </form>
    </div>
  </div>
</div>
</body></html>
